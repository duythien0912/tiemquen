<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tiệm Quen — đơn nhóm</title>
  <link rel="icon" href="/seller/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/buyer/styles.css">
  <style>
    .tqg-wrap { max-width: 640px; margin: 0 auto; padding: 16px; }
    .tqg-dish-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,.06); }
    .tqg-dish-row span.name { flex: 1; }
    .tqg-dish-row input[type=number] { width: 64px; padding: 10px 6px; border-radius: 8px; border: 1px solid rgba(0,0,0,.2); font-size: 1rem; text-align: center; }
    .tqg-member { display: flex; justify-content: space-between; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,.06); }
    .tqg-member.payer strong { color: var(--tq-accent); }
    .tqg-member-items { color: var(--tq-text-faint); font-size: 0.82rem; margin: 0 0 6px; }
    .tqg-subtotal { font-weight: 700; margin: 10px 0 0; text-align: right; }
    .tq-field input, .tq-field select { padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,.15); font-size: 1rem; }
    .tqg-pay-actions { display: flex; flex-direction: column; gap: 8px; margin: 6px 0 14px; }
    .tqg-pay-actions a, .tqg-pay-actions button { text-align: center; text-decoration: none; }
    .tqg-optional { color: var(--tq-text-faint); font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="tqg-wrap" id="app"><p class="tq-loading">Đang tải đơn nhóm…</p></div>

  <script>
    (function () {
      "use strict";
      var injected = window.__TIEMQUEN_GROUP__ || {};
      var gid = injected.gid || location.pathname.split("/").filter(Boolean).pop();
      var shopInfo = injected.shop || {};
      var app = document.getElementById("app");
      var menuDishes = null;
      var pollTimer = null;
      var lastSnapshot = ""; // members-JSON để chỉ re-render khi có thay đổi

      function el(tag, cls, text) {
        var e = document.createElement(tag);
        if (cls) e.className = cls;
        if (text != null) e.textContent = text;
        return e;
      }
      function vnd(n) { return (n || 0).toLocaleString("vi-VN") + "đ"; }

      function fetchJSON(url, opts) {
        return fetch(url, opts).then(function (r) {
          if (!r.ok) return r.json().then(function (e) { throw new Error(e.detail || "lỗi"); });
          return r.json();
        });
      }

      function loadMenu(slug) {
        if (menuDishes) return Promise.resolve();
        return fetchJSON("/api/shops/" + encodeURIComponent(slug) + "/menu").then(function (body) {
          menuDishes = body.menu.dishes;
        });
      }

      function memberItemsText(member) {
        return (member.items || [])
          .map(function (it) { return it.qty + "× " + it.name; }).join(", ");
      }

      function renderOpen(group) {
        app.innerHTML = "";
        app.appendChild(el("h1", null, "Đặt chung — " + (shopInfo.name || group.shop_slug)));
        app.appendChild(el("p", "tq-hero-tagline", "Mỗi người tự chọn món, chốt xong 1 đơn 1 ship. Trang tự cập nhật khi có người thêm món."));

        var memberNames = Object.keys(group.members);
        var membersBox = el("div", "tq-checkout");
        membersBox.appendChild(el("h2", null, "Đã order (" + memberNames.length + ")"));
        if (!memberNames.length) {
          membersBox.appendChild(el("p", "tqg-member-items", "Chưa ai chọn món — bạn mở hàng đi!"));
        }
        memberNames.forEach(function (name) {
          var m = group.members[name];
          var row = el("div", "tqg-member");
          row.appendChild(el("span", null, name));
          row.appendChild(el("strong", null, vnd(m.subtotal)));
          membersBox.appendChild(row);
          membersBox.appendChild(el("p", "tqg-member-items", memberItemsText(m)));
        });
        app.appendChild(membersBox);

        var form = el("form", "tq-checkout");
        form.appendChild(el("h2", null, "Thêm phần của bạn"));
        form.appendChild(el("p", "tqg-optional", "Đã order rồi? Nhập lại đúng tên cũ để sửa phần của mình."));
        var nameField = el("label", "tq-field");
        nameField.appendChild(el("span", null, "Tên bạn"));
        var nameInput = document.createElement("input");
        nameInput.name = "name"; nameInput.required = true;
        nameField.appendChild(nameInput);
        form.appendChild(nameField);

        var qtyInputs = {};
        var subtotalLine = el("p", "tqg-subtotal", "Phần của bạn: 0đ");
        function updateSubtotal() {
          var sum = 0;
          Object.keys(qtyInputs).forEach(function (id) {
            sum += (parseInt(qtyInputs[id].value, 10) || 0) * menuDishes[id].price;
          });
          subtotalLine.textContent = "Phần của bạn: " + vnd(sum);
        }
        Object.keys(menuDishes).forEach(function (dishId) {
          var dish = menuDishes[dishId];
          if (dish.hidden || dish.sold_out) return;
          var row = el("div", "tqg-dish-row");
          row.appendChild(el("span", "name", dish.name + " — " + vnd(dish.price)));
          var qty = document.createElement("input");
          qty.type = "number"; qty.min = "0"; qty.value = "0";
          qty.setAttribute("inputmode", "numeric");
          qty.addEventListener("input", updateSubtotal);
          qtyInputs[dishId] = qty;
          row.appendChild(qty);
          form.appendChild(row);
        });
        form.appendChild(subtotalLine);

        var submit = el("button", "tq-btn tq-btn-submit", "Thêm vào đơn nhóm");
        submit.type = "submit";
        form.appendChild(submit);
        form.addEventListener("submit", function (ev) {
          ev.preventDefault();
          var items = Object.keys(qtyInputs)
            .map(function (id) { return { dish_id: id, name: menuDishes[id].name, price: menuDishes[id].price, qty: parseInt(qtyInputs[id].value, 10) || 0 }; })
            .filter(function (it) { return it.qty > 0; });
          if (!nameInput.value.trim() || !items.length) {
            window.alert("Cần tên và ít nhất 1 món.");
            return;
          }
          submit.disabled = true;
          fetchJSON("/group-orders/" + gid + "/members", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: nameInput.value.trim(), items: items }),
          }).then(function () { return load(true); })
            .catch(function (e) { window.alert(e.message); })
            .then(function () { submit.disabled = false; });
        });
        app.appendChild(form);

        var closeForm = el("form", "tq-checkout");
        closeForm.appendChild(el("h2", null, "Chốt kèo (bạn trả hộ cả nhóm)"));
        var closerField = el("label", "tq-field");
        closerField.appendChild(el("span", null, "Ai trả hộ?"));
        var closerSelect = document.createElement("select");
        closerSelect.name = "closer";
        memberNames.forEach(function (name) {
          var opt = document.createElement("option");
          opt.value = name; opt.textContent = name;
          closerSelect.appendChild(opt);
        });
        closerField.appendChild(closerSelect);
        closeForm.appendChild(closerField);
        ["phone", "address", "note"].forEach(function (field) {
          var f = el("label", "tq-field");
          f.appendChild(el("span", null, field === "phone" ? "SĐT nhận hàng" : field === "address" ? "Địa chỉ / toà nhà" : "Ghi chú"));
          var input = document.createElement("input");
          input.name = field;
          if (field === "phone") { input.type = "tel"; input.setAttribute("inputmode", "tel"); }
          if (field !== "note") input.required = true;
          closeForm.appendChild(f);
          f.appendChild(input);
        });

        // Tài khoản nhận lại tiền (không bắt buộc) -> mọi người được nút
        // "mở app bank" + copy sẵn số tiền đúng phần mình.
        closeForm.appendChild(el("p", "tqg-optional",
          "Nhập STK của bạn (không bắt buộc) — mỗi người sẽ có nút chuyển khoản đúng số tiền phần mình."));
        var bankField = el("label", "tq-field");
        bankField.appendChild(el("span", null, "Ngân hàng (VCB, TCB, MB…)"));
        var bankInput = document.createElement("input");
        bankInput.name = "payer_bank"; bankInput.placeholder = "VCB";
        bankField.appendChild(bankInput);
        closeForm.appendChild(bankField);
        var acctField = el("label", "tq-field");
        acctField.appendChild(el("span", null, "Số tài khoản của bạn"));
        var acctInput = document.createElement("input");
        acctInput.name = "payer_account"; acctInput.setAttribute("inputmode", "numeric");
        acctField.appendChild(acctInput);
        closeForm.appendChild(acctField);

        var closeBtn = el("button", "tq-btn tq-btn-submit", "Chốt đơn — báo quán giao");
        closeBtn.type = "submit";
        closeForm.appendChild(closeBtn);
        closeForm.addEventListener("submit", function (ev) {
          ev.preventDefault();
          var fd = new FormData(closeForm);
          var body = {
            closer_name: fd.get("closer"),
            customer: { name: fd.get("closer"), phone: fd.get("phone"), address: fd.get("address"), note: fd.get("note") || "" },
          };
          var bank = (fd.get("payer_bank") || "").toString().trim();
          var account = (fd.get("payer_account") || "").toString().trim();
          if (bank && account) body.payer_vietqr = { bank: bank, account: account };
          closeBtn.disabled = true;
          fetchJSON("/group-orders/" + gid + "/close", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          }).then(function () { return load(true); })
            .catch(function (e) { window.alert(e.message); })
            .then(function () { closeBtn.disabled = false; });
        });
        if (!memberNames.length) closeForm.style.display = "none";
        app.appendChild(closeForm);
      }

      function renderClosed(group, split) {
        stopPolling();
        app.innerHTML = "";
        app.appendChild(el("h1", null, "Đơn nhóm đã chốt ✅"));
        var names = Object.keys(split);
        var payerName = names.filter(function (n) { return split[n].is_payer; })[0] || "";
        var hasDebtors = names.some(function (n) { return !split[n].is_payer && split[n].amount > 0; });

        app.appendChild(el("p", null,
          "Quán sẽ giao 1 lần" + (shopInfo.name ? " từ " + shopInfo.name : "") + "." +
          (hasDebtors ? " Chuyển khoản lại cho " + payerName + " (người trả hộ):" : "")));

        var box = el("div", "tq-checkout");
        names.forEach(function (name) {
          var s = split[name];
          var row = el("div", "tqg-member" + (s.is_payer ? " payer" : ""));
          row.appendChild(el("span", null, s.is_payer ? name + " (đã trả hộ)" : name));
          row.appendChild(el("strong", null, vnd(s.amount)));
          box.appendChild(row);

          if (s.vietqr) {
            var actions = el("div", "tqg-pay-actions");
            var open = document.createElement("a");
            open.className = "tq-btn";
            open.href = s.vietqr.deep_link;
            open.textContent = "🏦 " + name + " — mở app bank, chuyển " + vnd(s.amount);
            actions.appendChild(open);
            var copyBtn = el("button", "tq-btn tq-btn-reorder", "📋 Copy số TK + số tiền");
            copyBtn.type = "button";
            copyBtn.addEventListener("click", function () {
              var done = function () { copyBtn.textContent = "✓ Đã copy"; };
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(s.vietqr.copy_text).then(done, function () {
                  window.prompt("Copy nội dung này:", s.vietqr.copy_text);
                });
              } else {
                window.prompt("Copy nội dung này:", s.vietqr.copy_text);
              }
            });
            actions.appendChild(copyBtn);
            box.appendChild(actions);
          } else if (s.vietqr_placeholder) {
            box.appendChild(el("p", "tq-dish-note",
              "Chuyển cho " + s.vietqr_placeholder.payee + " — nội dung: " + s.vietqr_placeholder.note));
          }
        });
        app.appendChild(box);

        var hint = el("p", "tqg-optional",
          "Quán đang chuẩn bị đơn. Người nhận hàng chuẩn bị tổng " +
          vnd(names.reduce(function (t, n) { return t + split[n].amount; }, 0)) + " nếu cả nhóm trả tiền mặt.");
        app.appendChild(hint);
      }

      function stopPolling() {
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      }

      // Poll 5s: group Zalo thêm món rải rác — ai đang mở trang phải thấy
      // người khác vào kèo mà không cần F5. Chỉ re-render khi dữ liệu đổi
      // (đỡ mất chữ đang gõ); form đang gõ dở thì giữ nguyên giá trị input.
      function startPolling() {
        if (pollTimer) return;
        pollTimer = setInterval(function () {
          fetchJSON("/group-orders/" + gid).then(function (group) {
            var snap = JSON.stringify({ m: group.members, s: group.status });
            if (snap === lastSnapshot) return;
            var typing = document.activeElement &&
              (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA") &&
              document.activeElement.value;
            if (typing && group.status !== "closed") return; // đợi gõ xong rồi cập nhật
            lastSnapshot = snap;
            if (group.status === "closed") renderClosed(group, group.split);
            else renderOpen(group);
          }).catch(function () {});
        }, 5000);
      }

      function load(force) {
        return fetchJSON("/group-orders/" + gid).then(function (group) {
          return loadMenu(group.shop_slug).then(function () {
            lastSnapshot = JSON.stringify({ m: group.members, s: group.status });
            if (group.status === "closed") renderClosed(group, group.split);
            else { renderOpen(group); startPolling(); }
          });
        });
      }

      load().catch(function (e) {
        app.innerHTML = '<p class="tq-error">Không tải được đơn nhóm (' + e.message + ").</p>";
      });
    })();
  </script>
</body>
</html>
